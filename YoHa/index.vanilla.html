<style>
  *,*::before,*::after { -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  body {
    font-family:'Inter',ui-sans-serif,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    overflow-x:hidden;
  }
  ::selection { background:#fb923c; color:#fff; }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:999px; }
  ::-webkit-scrollbar-thumb:hover { background:#94a3b8; }
  .dark ::-webkit-scrollbar-thumb { background:#334155; }
  .dark ::-webkit-scrollbar-thumb:hover { background:#475569; }

  /* Hide native cursor on desktop with custom cursor */
  @media (pointer:fine) {
    body.has-cursor, body.has-cursor a, body.has-cursor button, body.has-cursor input { cursor: none !important; }
  }

  .glass {
    background:rgba(255,255,255,.65);
    backdrop-filter:saturate(180%) blur(18px);
    -webkit-backdrop-filter:saturate(180%) blur(18px);
    border:1px solid rgba(255,255,255,.5);
  }
  .dark .glass { background:rgba(15,23,42,.55); border:1px solid rgba(255,255,255,.08); }

  .glass-strong {
    background:rgba(255,255,255,.85);
    backdrop-filter:saturate(180%) blur(24px);
    -webkit-backdrop-filter:saturate(180%) blur(24px);
    border:1px solid rgba(255,255,255,.6);
  }
  .dark .glass-strong { background:rgba(2,6,23,.78); border:1px solid rgba(255,255,255,.08); }

  .text-gradient {
    background:linear-gradient(120deg,#f97316 0%,#ec4899 35%,#8b5cf6 70%,#3b82f6 100%);
    background-size:200% 200%;
    -webkit-background-clip:text; background-clip:text; color:transparent;
    animation:gradient-x 8s ease infinite;
  }
  .text-glow {
    text-shadow: 0 0 20px rgba(249, 115, 22, 0.25), 0 0 40px rgba(236, 72, 153, 0.15);
  }
  .text-glow-slow {
    text-shadow: 0 0 25px rgba(249, 115, 22, 0.2), 0 0 50px rgba(236, 72, 153, 0.1);
  }

  .btn-shine { position:relative; overflow:hidden; }
  .btn-shine::after {
    content:''; position:absolute; top:0; left:0; width:40%; height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,.55),transparent);
    transform:translateX(-120%); pointer-events:none;
  }
  .btn-shine:hover::after { animation:shine 1.2s linear; }
  @keyframes shine { 0%{transform:translateX(-120%)} 100%{transform:translateX(220%)} }

  .ripple { position:relative; overflow:hidden; }
  .ripple-effect {
    position:absolute; border-radius:9999px; transform:scale(0);
    animation:ripple-anim .7s cubic-bezier(.16,1,.3,1);
    background-color:rgba(255,255,255,.6); pointer-events:none;
  }
  @keyframes ripple-anim { to { transform:scale(4); opacity:0; } }

  .skeleton {
    background:linear-gradient(90deg,#e2e8f0 0%,#f1f5f9 40%,#e2e8f0 80%);
    background-size:1000px 100%;
    animation:shimmer 1.6s linear infinite;
  }
  .dark .skeleton {
    background:linear-gradient(90deg,#1e293b 0%,#334155 40%,#1e293b 80%);
    background-size:1000px 100%;
  }

  .no-scrollbar::-webkit-scrollbar { display:none; }
  .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }

  .card-lift { transition:transform .35s cubic-bezier(.16,1,.3,1), box-shadow .35s; }

  .mesh-bg {
    background-image:
      radial-gradient(at 20% 25%,rgba(249,115,22,.35) 0,transparent 50%),
      radial-gradient(at 80% 15%,rgba(168,85,247,.30) 0,transparent 50%),
      radial-gradient(at 65% 85%,rgba(59,130,246,.30) 0,transparent 50%),
      radial-gradient(at 10% 80%,rgba(236,72,153,.30) 0,transparent 50%);
  }
  .dark .mesh-bg {
    background-image:
      radial-gradient(at 20% 25%,rgba(249,115,22,.25) 0,transparent 50%),
      radial-gradient(at 80% 15%,rgba(168,85,247,.22) 0,transparent 50%),
      radial-gradient(at 65% 85%,rgba(59,130,246,.22) 0,transparent 50%),
      radial-gradient(at 10% 80%,rgba(236,72,153,.22) 0,transparent 50%);
  }

  .mesh-conic {
    background:conic-gradient(from 180deg at 50% 50%,
      rgba(249,115,22,.3) 0deg,
      rgba(236,72,153,.3) 90deg,
      rgba(139,92,246,.3) 180deg,
      rgba(59,130,246,.3) 270deg,
      rgba(249,115,22,.3) 360deg);
    filter:blur(40px);
  }

  .grid-bg {
    background-image:
      linear-gradient(rgba(15,23,42,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(15,23,42,.05) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image:radial-gradient(ellipse at center, #000 30%, transparent 70%);
    -webkit-mask-image:radial-gradient(ellipse at center, #000 30%, transparent 70%);
  }
  .dark .grid-bg {
    background-image:
      linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
  }

  .caret { display:inline-block; width:3px; background:currentColor; animation:caret 1s steps(1) infinite; margin-left:2px; }
  @keyframes caret { 50% { opacity:0; } }

  img { -webkit-user-drag:none; }

  button:focus-visible, a:focus-visible, input:focus-visible {
    outline:2px solid #fb923c; outline-offset:2px; border-radius:12px;
  }

  .page-enter { animation:fade-up .55s cubic-bezier(.16,1,.3,1) both; }
  @keyframes fade-up { 0%{opacity:0;transform:translateY(20px)} 100%{opacity:1;transform:translateY(0)} }

  .reveal { opacity:0; transform:translateY(30px); transition:opacity .8s cubic-bezier(.16,1,.3,1), transform .8s cubic-bezier(.16,1,.3,1); }
  .reveal.in { opacity:1; transform:translateY(0); }

  .marquee { display:flex; width:max-content; animation:marquee 28s linear infinite; }
  @keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }

  button { user-select:none; }

  /* === CUSTOM CURSOR === */
  .cursor-dot {
    position:fixed; top:0; left:0; width:8px; height:8px; border-radius:50%;
    background:#f97316; pointer-events:none; z-index:9999;
    transform:translate(-50%,-50%); transition:opacity .2s, background .2s, transform .15s;
    mix-blend-mode:difference;
  }
  .cursor-ring {
    position:fixed; top:0; left:0; width:42px; height:42px; border-radius:50%;
    border:2px solid rgba(249,115,22,.6); pointer-events:none; z-index:9998;
    transform:translate(-50%,-50%);
    transition:width .35s cubic-bezier(.16,1,.3,1), height .35s cubic-bezier(.16,1,.3,1),
               border-color .25s, background .25s, opacity .2s;
  }
  .cursor-ring.is-active { width:64px; height:64px; border-color:rgba(249,115,22,.85); background:rgba(249,115,22,.08); }
  .cursor-ring.is-img    { width:80px; height:80px; border-color:rgba(255,255,255,.7); background:rgba(255,255,255,.04); }
  @media (pointer:coarse) { .cursor-dot, .cursor-ring { display:none; } }

  /* === SCROLL PROGRESS === */
  .scroll-progress {
    position:fixed; top:0; left:0; height:3px; z-index:100;
    background:linear-gradient(90deg,#f97316,#ec4899,#8b5cf6,#3b82f6);
    background-size:200% 100%;
    animation:gradient-x 4s ease infinite;
    box-shadow:0 0 10px rgba(249,115,22,.6);
    transition:width .15s linear;
  }

  /* === SPOTLIGHT ON CARDS === */
  .spotlight { position:relative; isolation:isolate; }
  .spotlight::before {
    content:''; position:absolute; inset:0; border-radius:inherit;
    background:radial-gradient(600px circle at var(--mx,-100px) var(--my,-100px), rgba(249,115,22,.18), transparent 40%);
    opacity:0; transition:opacity .3s; pointer-events:none; z-index:1;
  }
  .spotlight:hover::before { opacity:1; }

  /* === HERO SPOTLIGHT === */
  .hero-spot::before {
    content:''; position:absolute; inset:-20%;
    background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(249,115,22,.16) 0%, transparent 35%);
    pointer-events:none; z-index:0; transition:background .15s;
  }
  .dark .hero-spot::before { background:radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(249,115,22,.12) 0%, transparent 35%); }

  /* === TILT 3D === */
  .tilt-3d { transform-style:preserve-3d; transition:transform .25s cubic-bezier(.16,1,.3,1); will-change:transform; }
  .tilt-3d > * { transform:translateZ(0); }

  .magnetic { transition:transform .25s cubic-bezier(.16,1,.3,1); will-change:transform; }

  /* === EMOJI DECORATIONS === */
  .emoji-deco {
    position:absolute; font-size:2rem; pointer-events:none; user-select:none;
    filter:drop-shadow(0 8px 16px rgba(0,0,0,.15));
    animation:float 7s ease-in-out infinite;
  }

  /* === ORBIT === */
  .orbit-container { position:relative; width:280px; height:280px; }
  .orbit-item {
    position:absolute; top:50%; left:50%;
    width:48px; height:48px; margin:-24px;
    display:grid; place-items:center; font-size:1.6rem;
    border-radius:50%; background:rgba(255,255,255,.9); backdrop-filter:blur(8px);
    box-shadow:0 6px 20px rgba(15,23,42,.12);
  }
  .dark .orbit-item { background:rgba(15,23,42,.8); box-shadow:0 6px 20px rgba(0,0,0,.4); }

  /* === 3D CAROUSEL === */
  .carousel-3d { perspective:1400px; }
  .carousel-3d-inner {
    position:relative; width:100%; height:100%;
    transform-style:preserve-3d;
    animation:spin-3d 35s linear infinite;
  }
  .carousel-3d-inner:hover { animation-play-state:paused; }
  .carousel-3d-card {
    position:absolute; top:50%; left:50%;
    width:240px; height:320px; margin:-160px 0 0 -120px;
    border-radius:1.5rem; overflow:hidden;
    box-shadow:0 30px 60px -20px rgba(0,0,0,.4);
  }

  /* === TESTI scroll snap === */
  .testi-track { scroll-snap-type:x mandatory; }
  .testi-track > * { scroll-snap-align:start; }

  /* === LIVE TRACKER === */
  .live-tracker {
    position:fixed; bottom:24px; left:24px; z-index:35;
    width:300px; transform:translateY(40px); opacity:0;
    transition:transform .5s cubic-bezier(.16,1,.3,1), opacity .5s;
  }
  .live-tracker.show { transform:translateY(0); opacity:1; }
  @media (max-width:768px) { .live-tracker { display:none; } }

  /* === FLY TO CART === */
  .fly-clone {
    position:fixed; z-index:200; pointer-events:none;
    border-radius:50%; overflow:hidden;
    transition:transform .9s cubic-bezier(.65,-0.05,.35,1), opacity .3s linear .6s;
    will-change:transform, opacity;
  }
  .cart-shake { animation: cart-shake .5s ease-in-out; }
  @keyframes cart-shake {
    0%, 100% { transform: scale(1); }
    25% { transform: scale(1.25) rotate(-10deg); }
    50% { transform: scale(.9) rotate(10deg); }
    75% { transform: scale(1.15) rotate(-5deg); }
  }

  /* === LOADING SPLASH === */
  #yoha-splash {
    position:fixed; inset:0; z-index:200;
    background:radial-gradient(ellipse at center, #1e293b 0%, #020617 100%);
    display:grid; place-items:center;
    transition:opacity .7s ease, visibility .7s;
  }
  #yoha-splash.hide { opacity:0; visibility:hidden; pointer-events:none; }

  /* === ANIMATED HEADING === */
  .word-anim { display:inline-block; overflow:hidden; vertical-align:bottom; line-height:1; padding-bottom:.1em; }
  .word-anim > span { display:inline-block; }

  /* === GRADIENT BORDER === */
  .grad-border { position:relative; }
  .grad-border::before {
    content:''; position:absolute; inset:0; padding:1.5px; border-radius:inherit;
    background:linear-gradient(135deg,#f97316,#ec4899,#8b5cf6);
    background-size:200% 200%; animation:gradient-x 4s ease infinite;
    -webkit-mask:linear-gradient(#000,#000) content-box,linear-gradient(#000,#000);
    -webkit-mask-composite:xor; mask-composite:exclude;
    pointer-events:none;
  }

  /* === PULSE RING === */
  .pulse-ring {
    position:absolute; inset:0; border-radius:inherit;
    box-shadow:0 0 0 0 rgba(249,115,22,.6);
    animation:ring 2s ease-out infinite;
  }
  @keyframes ring {
    0% { box-shadow:0 0 0 0 rgba(249,115,22,.6); }
    100% { box-shadow:0 0 0 24px rgba(249,115,22,0); }
  }

  /* === Hover lift on lift-on-hover === */
  .lift-on-hover { transition: transform .35s cubic-bezier(.16,1,.3,1), box-shadow .35s; }
  .lift-on-hover:hover { transform: translateY(-6px); box-shadow: 0 24px 50px -12px rgba(15,23,42,.2); }
</style>
</head>

const DELIVERY_FEE_DH  = 16; // charges livraison
const PROFIT_FACTOR    = 0.20; // 20 % sur (CA − forfait client), commission resto
const PROFIT_FIXED     = 12;   // MAD : base déduite + forfait client
const computeProfit  = (totalDh) => {
  const t = typeof totalDh === 'number' ? totalDh : parseFloat(totalDh);
  if (!Number.isFinite(t)) return 0;
  return (t - PROFIT_FIXED) * PROFIT_FACTOR + PROFIT_FIXED;
};
const PROFIT_NET_FACTOR = 0.99;
const computeNet     = (totalDh) => (computeProfit(totalDh) - DELIVERY_FEE_DH) * PROFIT_NET_FACTOR;

/* ============================================================================
   CUSTOM CURSOR — dot + morphing ring with hover states
============================================================================ */
function CursorFollower() {
  useEffect(() => {
    if (window.matchMedia('(pointer: coarse)').matches) return;
    document.body.classList.add('has-cursor');

    const dot  = document.createElement('div');
    const ring = document.createElement('div');
    dot.className  = 'cursor-dot';
    ring.className = 'cursor-ring';
    document.body.appendChild(dot);
    document.body.appendChild(ring);

    let mx = -100, my = -100;
    let rx = -100, ry = -100;
    let raf;

    const onMove = e => {
      mx = e.clientX; my = e.clientY;
      dot.style.transform = `translate(${mx}px, ${my}px) translate(-50%, -50%)`;
    };
    const tick = () => {
      rx += (mx - rx) * 0.18;
      ry += (my - ry) * 0.18;
      ring.style.transform = `translate(${rx}px, ${ry}px) translate(-50%, -50%)`;
      raf = requestAnimationFrame(tick);
    };

    const findInteractive = (el) => {
      while (el && el !== document.body) {
        if (el.matches && el.matches('button, a, input, [role="button"], .cursor-grow')) return 'btn';
        if (el.matches && el.matches('img, .cursor-img, .menu-img')) return 'img';
        el = el.parentElement;
      }
      return null;
    };

    const onOver = e => {
      const kind = findInteractive(e.target);
      ring.classList.toggle('is-active', kind === 'btn');
      ring.classList.toggle('is-img',    kind === 'img');
    };

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseover', onOver);
    raf = requestAnimationFrame(tick);

    return () => {
      cancelAnimationFrame(raf);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseover', onOver);
      document.body.classList.remove('has-cursor');
      dot.remove(); ring.remove();
    };
  }, []);
  return null;
}

/* ============================================================================
   SCROLL PROGRESS BAR
============================================================================ */
function ScrollProgress() {
  const [w, setW] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      const max = document.documentElement.scrollHeight - window.innerHeight;
      setW(max > 0 ? (window.scrollY / max) * 100 : 0);
    };
    window.addEventListener('scroll', onScroll, { passive:true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return <div className="scroll-progress" style={{ width: w + '%' }}/>;
}

/* ============================================================================
   CANVAS PARTICLE NETWORK — interactive, performant
============================================================================ */
function ParticleCanvas() {
  const ref = useRef();
  useEffect(() => {
    const canvas = ref.current; if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let particles = [], mouse = { x: -1000, y: -1000 }, raf;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);

    const resize = () => {
      const w = canvas.offsetWidth, h = canvas.offsetHeight;
      canvas.width = w * dpr; canvas.height = h * dpr;
      ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr, dpr);
      const count = Math.min(75, Math.floor((w * h) / 16000));
      particles = Array.from({ length: count }, () => ({
        x: Math.random() * w, y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        r: 1 + Math.random() * 2.4,
      }));
    };

    const onMove = e => {
      const r = canvas.getBoundingClientRect();
      mouse.x = e.clientX - r.left;
      mouse.y = e.clientY - r.top;
    };
    const onLeave = () => { mouse.x = -1000; mouse.y = -1000; };

    const draw = () => {
      const w = canvas.offsetWidth, h = canvas.offsetHeight;
      ctx.clearRect(0, 0, w, h);

      particles.forEach(p => {
        const dx = p.x - mouse.x, dy = p.y - mouse.y;
        const d2 = dx*dx + dy*dy;
        if (d2 < 140*140) {
          const dist = Math.sqrt(d2) || 1;
          const force = (140 - dist) / 140 * 1.4;
          p.x += (dx / dist) * force;
          p.y += (dy / dist) * force;
        }
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0)   { p.x = 0;   p.vx *= -1; }
        if (p.x > w)   { p.x = w;   p.vx *= -1; }
        if (p.y < 0)   { p.y = 0;   p.vy *= -1; }
        if (p.y > h)   { p.y = h;   p.vy *= -1; }
      });

      /* connections */
      ctx.lineWidth = 1;
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i], b = particles[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d2 = dx*dx + dy*dy;
          if (d2 < 130*130) {
            const dist = Math.sqrt(d2);
            const alpha = (1 - dist / 130) * 0.28;
            ctx.strokeStyle = `rgba(249, 115, 22, ${alpha})`;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }

      /* particles */
      particles.forEach(p => {
        const dx = p.x - mouse.x, dy = p.y - mouse.y;
        const d2 = dx*dx + dy*dy;
        const near = d2 < 140*140;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r + (near ? 1 : 0), 0, Math.PI * 2);
        ctx.fillStyle = near ? 'rgba(236,72,153,0.85)' : 'rgba(249,115,22,0.65)';
        ctx.fill();
      });

      raf = requestAnimationFrame(draw);
    };

    resize();
    window.addEventListener('resize', resize);
    canvas.addEventListener('mousemove', onMove);
    canvas.addEventListener('mouseleave', onLeave);
    raf = requestAnimationFrame(draw);

    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener('resize', resize);
      canvas.removeEventListener('mousemove', onMove);
      canvas.removeEventListener('mouseleave', onLeave);
    };
  }, []);
  return <canvas ref={ref} className="absolute inset-0 w-full h-full" />;
}

/* ============================================================================

function LiveOrderTracker({ visible }) {

    const active = orders.filter(o => o.status !== 'delivered');

    return active.sort((a,b) => b.createdAt - a.createdAt)[0];
  }, [orders]);

    if (!visible) { setShow(false); return; }

/* ============================================================================
   FLY TO CART — clones image and animates to cart icon
============================================================================ */
function flyToCart(sourceEl, targetEl, imgSrc) {
  const sRect = sourceEl.getBoundingClientRect();
  const tRect = targetEl.getBoundingClientRect();
  const startSize = Math.min(sRect.width, 80);
  const clone = document.createElement('div');
  clone.className = 'fly-clone';
  clone.style.width = startSize + 'px';
  clone.style.height = startSize + 'px';
  clone.style.left = (sRect.left + sRect.width/2 - startSize/2) + 'px';
  clone.style.top  = (sRect.top  + sRect.height/2 - startSize/2) + 'px';
  clone.style.background = `url(${imgSrc}) center/cover`;
  clone.style.boxShadow = '0 10px 30px rgba(249,115,22,.45)';
  clone.style.transform = 'scale(1) rotate(0deg)';
  document.body.appendChild(clone);

  /* trigger transition */
  requestAnimationFrame(() => {
    const dx = (tRect.left + tRect.width/2)  - (sRect.left + sRect.width/2);
    const dy = (tRect.top  + tRect.height/2) - (sRect.top  + sRect.height/2);
    clone.style.transform = `translate(${dx}px, ${dy}px) scale(0.15) rotate(720deg)`;
    clone.style.opacity = '0';
  });

  setTimeout(() => clone.remove(), 1100);
}

function RestaurantPage({ restaurant, onBack, onAdd }) {
  const r = restaurant;
  const [activeCat, setActiveCat] = useState(r.menu[0].category);
  const sectionRefs = useRef({});

  const scrollToCat = (cat) => {
    setActiveCat(cat);
    const el = sectionRefs.current[cat];
    if (el) {
      const top = el.getBoundingClientRect().top + window.scrollY - 180;
      window.scrollTo({ top, behavior:'smooth' });
    }
  };

  useEffect(() => {
    const onScroll = () => {
      const offsets = r.menu.map(c => ({
        cat: c.category,
        top: sectionRefs.current[c.category]?.getBoundingClientRect().top || 0
      }));
      const visible = offsets.filter(o => o.top < 220).pop();
      if (visible) setActiveCat(visible.cat);
    };
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, [r]);

  return (
    <div className="page-enter">
      <section className="relative h-[42vh] sm:h-[55vh] min-h-[280px] overflow-hidden">
        <img src={r.cover} alt={r.name} className="absolute inset-0 w-full h-full object-cover scale-105"/>
        <div className="absolute inset-0 bg-gradient-to-t from-ink-950 via-ink-950/40 to-transparent"></div>
        <div className="absolute inset-0 flex items-end">
          <div className="max-w-7xl mx-auto w-full px-4 sm:px-6 pb-8 sm:pb-12">
            <button onClick={onBack} className="cursor-grow mb-4 inline-flex items-center gap-2 px-3 py-2 rounded-xl glass text-white hover:bg-white/20 transition">
              <I.Left size={18}/> Retour
            </button>
            <div className="flex items-end gap-4">
              <div className="w-16 h-16 sm:w-20 sm:h-20 rounded-2xl overflow-hidden border-4 border-white shadow-cardhover bg-white">
                <img src={r.logo} alt="" className="w-full h-full object-cover"/>
              </div>
              <div className="text-white">
                <h1 className="font-display font-black text-3xl sm:text-5xl tracking-tight">{r.name}</h1>
                <div className="mt-1 flex flex-wrap items-center gap-x-3 gap-y-1 text-sm">
                  <span className="inline-flex items-center gap-1"><I.Star size={14} className="fill-amber-400 text-amber-400"/> <b>{r.rating.toString().replace('.',',')}</b> <span className="opacity-70">({r.reviews}+ avis)</span></span>
                  <span className="opacity-70">•</span>
                  <span className="inline-flex items-center gap-1"><I.Clock size={14}/> {r.eta}</span>
                  <span className="opacity-70">•</span>
                  <span className="inline-flex items-center gap-1"><I.MapPin size={14}/> {r.distance}</span>
                  <span className="opacity-70">•</span>
                  <span className="inline-flex items-center gap-1"><I.Bike size={14}/> {r.fee}</span>
                </div>
              </div>
            </div>
            <p className="mt-3 max-w-2xl text-white/85 text-sm sm:text-base">{r.description}</p>
          </div>
        </div>
      </section>

      <div className="sticky top-16 z-30 glass-strong border-b border-ink-200/60 dark:border-ink-800/60">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 flex gap-1 overflow-x-auto no-scrollbar h-14 items-center">
          {r.menu.map(c => {
            const active = activeCat === c.category;
            return (
              <button key={c.category} onClick={() => scrollToCat(c.category)}
                className={`cursor-grow shrink-0 px-4 h-10 rounded-full text-sm font-semibold transition-all ${active
                  ? 'bg-ink-900 text-white dark:bg-white dark:text-ink-900'
                  : 'text-ink-600 dark:text-ink-300 hover:bg-ink-100 dark:hover:bg-ink-800'}`}>
                {c.category}
              </button>
            );
          })}
        </div>
      </div>

      <section className="max-w-7xl mx-auto px-4 sm:px-6 py-10">
        {r.menu.map(cat => (
          <div key={cat.category} ref={el => sectionRefs.current[cat.category] = el} className="mb-12 scroll-mt-44">

            <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
              {cat.items.map((it, i) => (
                <Reveal key={it.id} delay={i*40}>
                  <MenuItem item={it} restaurant={r} onAdd={onAdd} />
                </Reveal>
              ))}

        ))}

    </div>
  );

/* ============================================================================
   PRIMITIVES
============================================================================ */
function Button({ children, variant='primary', size='md', className='', onClick, disabled, ...rest }) {
  const sizes = { md:'h-11 px-5 text-sm', lg:'h-14 px-7 text-base', sm:'h-9 px-3 text-sm' };
  const variants = {
    primary:'bg-gradient-to-r from-brand-500 via-pink-500 to-violet-500 text-white shadow-glow hover:shadow-glow-lg hover:-translate-y-0.5',
    ghost:  'bg-white/60 dark:bg-ink-900/60 backdrop-blur border border-ink-200/60 dark:border-ink-800 hover:border-brand-500',
    glass:  'glass-strong text-white border border-white/20 hover:bg-white/20',
    dark:   'bg-ink-900 text-white dark:bg-white dark:text-ink-900 hover:opacity-90',
  };
  return (
    <button
      onClick={(e) => { rippleEffect(e); onClick && onClick(e); }}
      disabled={disabled}
      className={`cursor-grow ripple btn-shine relative inline-flex items-center justify-center gap-2 font-semibold rounded-2xl transition-all active:scale-95 disabled:opacity-60 disabled:cursor-not-allowed ${sizes[size]} ${variants[variant]} ${className}`}
      {...rest}
    >
      {children}
    </button>
  );
}

function rippleEffect(e) {
  const target = e.currentTarget;
  if (!target) return;
  const rect = target.getBoundingClientRect();
  const ripple = document.createElement('span');
  const size = Math.max(rect.width, rect.height);
  ripple.className = 'ripple-effect';
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
  ripple.style.top  = (e.clientY - rect.top  - size/2) + 'px';
  target.appendChild(ripple);
  setTimeout(() => ripple.remove(), 700);
}

function Reveal({ children, delay = 0 }) {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { setTimeout(() => setShown(true), delay); io.disconnect(); }
    }, { rootMargin:'-30px' });
    io.observe(el);
    return () => io.disconnect();
  }, [delay]);
  return <div ref={ref} className={`reveal ${shown ? 'in' : ''}`}>{children}</div>;
}

function Tilt({ children, max = 8, className = "" }) {
  const ref = useRef();
  useEffect(() => {
    const el = ref.current; if (!el) return;
    if (window.matchMedia('(pointer: coarse)').matches) return;
    let isClicking = false;
    const onMove = (e) => {
      if (isClicking) return;
      const r = el.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width - 0.5;
      const y = (e.clientY - r.top ) / r.height - 0.5;
      el.style.transform = `perspective(1100px) rotateX(${-y*max}deg) rotateY(${x*max}deg) translateY(-3px)`;
    };
    const onLeave = () => { if (!isClicking) el.style.transform = ''; };
    const onDown = () => { isClicking = true; };
    const onUp = () => { isClicking = false; };
    el.addEventListener('mousemove', onMove);
    el.addEventListener('mouseleave', onLeave);
    el.addEventListener('mousedown', onDown);
    window.addEventListener('mouseup', onUp);
    return () => {
      el.removeEventListener('mousemove', onMove);
      el.removeEventListener('mouseleave', onLeave);
      el.removeEventListener('mousedown', onDown);
      window.removeEventListener('mouseup', onUp);
    };
  }, [max]);
  return <div ref={ref} className={`tilt-3d ${className}`}>{children}</div>;
}

function Magnetic({ children, strength = 25 }) {
  const ref = useRef();
  useEffect(() => {
    const el = ref.current; if (!el) return;
    if (window.matchMedia('(pointer: coarse)').matches) return;
    let isClicking = false;
    const onMove = (e) => {
      if (isClicking) return;
      const r = el.getBoundingClientRect();
      const x = e.clientX - r.left - r.width/2;
      const y = e.clientY - r.top  - r.height/2;
      el.style.transform = `translate(${x/strength}px, ${y/strength}px)`;
    };
    const onLeave = () => { if (!isClicking) el.style.transform = ''; };
    const onDown = () => { isClicking = true; };
    const onUp = () => { isClicking = false; };
    el.addEventListener('mousemove', onMove);
    el.addEventListener('mouseleave', onLeave);
    el.addEventListener('mousedown', onDown);
    window.addEventListener('mouseup', onUp);
    return () => {
      el.removeEventListener('mousemove', onMove);
      el.removeEventListener('mouseleave', onLeave);
      el.removeEventListener('mousedown', onDown);
      window.removeEventListener('mouseup', onUp);
    };
  }, [strength]);
  return <div ref={ref} className="magnetic inline-block">{children}</div>;
}

function Counter({ to, duration = 1800, decimals = 0, suffix = '' }) {
  const [val, setVal] = useState(0);
  const ref = useRef();
  const started = useRef(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting && !started.current) {
        started.current = true;
        const start = performance.now();
        const tick = (now) => {
          const elapsed = now - start;
          const p = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - p, 3);
          setVal(to * eased);
          if (p < 1) requestAnimationFrame(tick);
          else setVal(to);
        };
        requestAnimationFrame(tick);
        io.disconnect();
      }
    });
    io.observe(el);
    return () => io.disconnect();
  }, [to, duration]);
  const display = decimals > 0
    ? val.toFixed(decimals).replace('.', ',')
    : Math.floor(val).toLocaleString('fr-FR');
  return <span ref={ref}>{display}{suffix}</span>;
}

/* === SVG Charts === */
function LineChart({ data, height=180, color='#f97316', color2='#ec4899' }) {
  const list = Array.isArray(data) && data.length ? data : [0];
  const max = Math.max(1, ...list.map((v) => Number(v) || 0));
  const w = 100;
  const denom = Math.max(1, list.length - 1);
  const points = list.map((v, i) => `${(i / denom) * w},${100 - ((Number(v) || 0) / max) * 90 - 5}`);
  const path = `M ${points.join(' L ')}`;
  const area = `M 0,100 L ${points.join(' L ')} L ${w},100 Z`;
  const id = 'chart-' + Math.random().toString(36).slice(2);
  return (
    <svg viewBox={`0 0 ${w} 100`} preserveAspectRatio="none" style={{ height, width:'100%' }}>
      <defs>
        <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stopColor={color} stopOpacity="0.45"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
        <linearGradient id={id+'-l'} x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stopColor={color}/>
          <stop offset="100%" stopColor={color2}/>
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#${id})`}/>
      <path d={path} fill="none" stroke={`url(#${id}-l)`} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke"/>
      {points.map((p, i) => {
        const [x, y] = p.split(',');
        return <circle key={i} cx={x} cy={y} r="1.4" fill="white" stroke={color} strokeWidth="0.5" vectorEffect="non-scaling-stroke"/>;
      })}
    </svg>
  );
}

function BarChart({ data, labels, color1='from-violet-500', color2='to-fuchsia-400' }) {
  const list = Array.isArray(data) ? data : [];
  const max = Math.max(1, ...list.map((v) => Number(v) || 0));
  return (
    <div className="flex gap-2 h-48 w-full min-w-0">
      {list.map((raw, i) => {
        const v = Number(raw) || 0;
        const pct = max > 0 ? (v / max) * 100 : 0;
        return (
          <div key={i} className="flex-1 flex flex-col min-w-0 h-full">
            <div className="flex-1 flex flex-col justify-end min-h-[7rem]">
              <div
                title={String(v)}
                className={`w-full rounded-t-xl bg-gradient-to-t ${color1} ${color2} shadow-md transition-all hover:opacity-90`}
                style={{ height: `${pct}%`, minHeight: v > 0 ? 10 : 2 }}
              />
            </div>
            <div className="shrink-0 pt-2 text-[10px] text-ink-500 text-center truncate" title={labels?.[i]}>
              {labels?.[i] ?? '—'}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function DonutChart({ data, colors, size=180 }) {
  const list = Array.isArray(data) ? data : [];
  const total = list.reduce((s, d) => s + (Number(d.value) || 0), 0) || 1;
  let angle = 0;
  const stops = [];
  list.forEach((d, i) => {
    const val = Number(d.value) || 0;
    if (val <= 0) return;
    const sweep = (val / total) * 360;
    const start = angle;
    angle += sweep;
    const c = colors[i % colors.length] ?? '#94a3b8';
    stops.push(`${c} ${start}deg ${angle}deg`);
  });
  const bg =
    stops.length > 0
      ? `conic-gradient(from -90deg, ${stops.join(', ')})`
      : 'conic-gradient(from -90deg, rgb(203 213 225) 0deg 360deg)';

  return (
    <div className="relative shrink-0 select-none" style={{ width: size, height: size }}>
      <div className="h-full w-full rounded-full shadow-inner ring-1 ring-ink-200/30 dark:ring-ink-700/40" style={{ background: bg }} />
      <div
        className="absolute left-1/2 top-1/2 h-[58%] w-[58%] -translate-x-1/2 -translate-y-1/2 rounded-full bg-white dark:bg-ink-900 shadow-sm ring-1 ring-ink-200/60 dark:ring-ink-700/60"
        aria-hidden
      />
      <div className="pointer-events-none absolute inset-0 grid place-items-center">
        <div className="text-center">
          <div className="font-display font-black text-2xl text-ink-900 dark:text-white">{total}</div>
          <div className="text-xs text-ink-500">Total</div>
        </div>
      </div>
    </div>
  );
}

/* === Stat Card === */
function StatCard({ label, value, sub, icon, color='from-brand-500 to-pink-500', trend }) {
  return (
    <div className="relative p-5 rounded-2xl bg-white dark:bg-ink-900 border border-ink-200/60 dark:border-ink-800 shadow-card overflow-hidden spotlight"
      onMouseMove={spotlightHandler}>
      <div className={`absolute -top-10 -right-10 w-32 h-32 rounded-full bg-gradient-to-br ${color} opacity-10 blur-2xl`}></div>
      <div className="relative flex items-start justify-between">
        <div>
          <div className="text-xs font-semibold uppercase tracking-wider text-ink-500">{label}</div>
          <div className="mt-1 font-display font-black text-2xl sm:text-3xl">{value}</div>
          {sub && <div className="mt-1 text-xs text-ink-500">{sub}</div>}
        </div>
        <span className={`w-10 h-10 rounded-xl bg-gradient-to-br ${color} text-white grid place-items-center shadow-md shrink-0`}>{icon}</span>
      </div>
      {trend !== undefined && (
        <div className={`relative mt-3 inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-[11px] font-bold ${trend >= 0 ? 'bg-emerald-500/10 text-emerald-600' : 'bg-red-500/10 text-red-600'}`}>
          {trend >= 0 ? '▲' : '▼'} {Math.abs(trend)}%

  );
}

/* === Status Pill === */
function StatusPill({ status }) {
  const s = ORDER_STATES[status] || { label:status, color:'bg-ink-500', text:'text-ink-700' };
  return (
    <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-bold bg-opacity-10 ${s.text}`} style={{ backgroundColor: 'rgb(' + (s.color.includes('amber') ? '254 243 199' : s.color.includes('sky') ? '224 242 254' : s.color.includes('violet') ? '237 233 254' : s.color.includes('emerald') ? '209 250 229' : s.color.includes('pink') ? '252 231 243' : '241 245 249') + ')' }}>

  );
}

              </tr>
            </thead>
            <tbody className="divide-y divide-ink-100 dark:divide-ink-800">
              {orders.slice(0, 10).map(o => (
                <tr key={o.id}>
                  <td className="px-4 py-2 font-bold">#{o.id}</td>
                  <td className="px-4 py-2 text-right">{o.totalDh.toFixed(0)} DH</td>
                  <td className="px-4 py-2 text-right text-violet-600 font-bold">+{o.profitDh.toFixed(2)} DH</td>
                  <td className="px-4 py-2 text-right text-red-500">-{DELIVERY_FEE_DH} DH</td>
                  <td className="px-4 py-2 text-right text-emerald-600 font-bold">{o.netDh.toFixed(2)} DH</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ============================================================================
   DELIVERY DASHBOARD
============================================================================ */
function DeliveryDashboard({ goto, dark, setDark }) {
  const [current, setCurrent] = useState('available');
  const { orders } = useOrders();
  const COURIER_ME = COURIERS[0]; // Yacine

  const titles = {
    available:'Commandes disponibles',
    mine:'Mes courses en cours',
    history:'Historique',
  };

  return (
    <DashLayout kind="delivery" current={current} setCurrent={setCurrent} goto={goto} dark={dark} setDark={setDark}
      title={titles[current]} subtitle={`Connecté en tant que ${COURIER_ME.name}`}>
      {current === 'available' && <DeliveryAvailable courier={COURIER_ME}/>}
      {current === 'mine'      && <DeliveryMine courier={COURIER_ME}/>}
      {current === 'history'   && <DeliveryHistory courier={COURIER_ME}/>}
    </DashLayout>
  );
}

function DeliveryAvailable({ courier }) {
  const { orders, assignCourier } = useOrders();
  const available = orders.filter(o => o.status === 'placed');

  return (
    <div className="space-y-4">
      <div className="rounded-2xl bg-gradient-to-br from-violet-500 via-fuchsia-500 to-pink-500 text-white p-5 shadow-glow-lg flex items-center gap-4">
        <span className="w-12 h-12 rounded-2xl bg-white/15 grid place-items-center text-xl">🛵</span>
        <div className="flex-1">
          <div className="font-display font-extrabold text-xl">{available.length} commande{available.length > 1 ? 's' : ''} en attente</div>
          <div className="text-white/80 text-sm">Cliquez sur "Confirm Pickup" pour prendre une commande.</div>
        </div>
      </div>

      {available.length === 0 ? (
        <div className="text-center py-20 rounded-2xl bg-white dark:bg-ink-900 border border-ink-200/60 dark:border-ink-800">
          <div className="text-6xl mb-4 animate-float-med">🍕</div>
          <h3 className="font-display font-bold text-xl">Pause bien méritée</h3>
          <p className="mt-1 text-ink-500">Aucune commande disponible pour l'instant.</p>
        </div>
      ) : (
        <div className="grid sm:grid-cols-2 gap-4">
          {available.map(o => (
            <DeliveryOrderCard key={o.id} order={o} action={
              <Button onClick={() => assignCourier(o.id, courier)} variant="primary" size="lg" className="w-full justify-center">
                ✅ Confirm Pickup
              </Button>
            }/>
          ))}
        </div>
      )}
    </div>
  );
}

function DeliveryMine({ courier }) {
  const { orders, updateOrderStatus } = useOrders();
  const mine = orders.filter(o => o.courierId === courier.id && o.status !== 'delivered');

  return (
    <div className="space-y-4">
      {mine.length === 0 ? (
        <div className="text-center py-20 rounded-2xl bg-white dark:bg-ink-900 border border-ink-200/60 dark:border-ink-800">
          <div className="text-6xl mb-4 animate-wiggle">📍</div>
          <h3 className="font-display font-bold text-xl">Aucune course en cours</h3>
          <p className="mt-1 text-ink-500">Allez prendre une commande dans "Disponibles".</p>
        </div>
      ) : (
        <div className="grid sm:grid-cols-2 gap-4">
          {mine.map(o => (
            <DeliveryOrderCard key={o.id} order={o} showMap action={
              <div className="space-y-2">
                {o.status === 'pickup_confirmed' && (
                  <div className="px-4 py-3 rounded-xl bg-amber-500/10 text-amber-600 text-sm font-semibold flex items-center gap-2">
                    <Loader/> En attente du restaurant…
                  </div>
                )}
                {o.status === 'preparing' && (
                  <div className="px-4 py-3 rounded-xl bg-violet-500/10 text-violet-600 text-sm font-semibold flex items-center gap-2">
                    👨‍🍳 Le restaurant prépare la commande
                  </div>
                )}
                {o.status === 'delivering' && (
                  <Button onClick={() => updateOrderStatus(o.id, 'delivered')} variant="primary" size="lg" className="w-full justify-center bg-gradient-to-r from-emerald-500 to-teal-500">
                    ✅ Marquer comme livré
                  </Button>
                )}
              </div>
            }/>
          ))}
        </div>
      )}
    </div>
  );
}

function DeliveryHistory({ courier }) {
  const { orders } = useOrders();
  const done = orders.filter(o => o.courierId === courier.id && o.status === 'delivered');
  return <RecentOrdersTable orders={done} title={`${done.length} livraisons effectuées`} full/>;
}

function DeliveryOrderCard({ order, action, showMap }) {
  return (
    <div className="rounded-2xl bg-white dark:bg-ink-900 border border-ink-200/60 dark:border-ink-800 shadow-card overflow-hidden lift-on-hover spotlight"
      onMouseMove={spotlightHandler}>
      <div className="p-5">
        <div className="flex items-start justify-between">
          <div>
            <div className="font-display font-extrabold text-xl">#{order.id}</div>
            <div className="text-xs text-ink-500">{order.restaurantName}</div>
          </div>
          <StatusPill status={order.status}/>
        </div>

        {showMap && (
          <div className="mt-4 relative h-32 rounded-xl overflow-hidden bg-gradient-to-br from-sky-100 to-indigo-100 dark:from-sky-900/40 dark:to-indigo-900/40 border border-ink-200/60 dark:border-ink-800">
            <svg viewBox="0 0 300 120" className="absolute inset-0 w-full h-full">
              <defs>
                <pattern id="g1" width="20" height="20" patternUnits="userSpaceOnUse">
                  <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(100,116,139,.2)" strokeWidth="0.5"/>
                </pattern>
              </defs>
              <rect width="300" height="120" fill="url(#g1)"/>
              <path d="M 20 80 Q 90 30, 160 60 T 280 30" stroke="#f97316" strokeWidth="3" fill="none" strokeLinecap="round" strokeDasharray="6 6"/>
              <circle cx="20" cy="80" r="6" fill="#ec4899"/>
              <text x="20" y="103" textAnchor="middle" fontSize="9" fontWeight="bold" fill="#ec4899">Resto</text>
              <circle cx="280" cy="30" r="6" fill="#10b981"/>
              <text x="280" y="20" textAnchor="middle" fontSize="9" fontWeight="bold" fill="#10b981">Client</text>
              <g style={{ offsetPath:"path('M 20 80 Q 90 30, 160 60 T 280 30')", animation:'bike-go 3s ease-in-out infinite alternate' }}>
                <circle r="10" fill="white" stroke="#f97316" strokeWidth="2"/>
                <text textAnchor="middle" y="3" fontSize="10">🛵</text>
              </g>
            </svg>
          </div>
        )}

        <div className="mt-4 space-y-2 text-sm">
          <div className="flex items-start gap-2">
            <span className="w-7 h-7 rounded-lg bg-pink-500/10 text-pink-600 grid place-items-center shrink-0"><I.Chef size={14}/></span>
            <div>
              <div className="text-[10px] uppercase tracking-wider text-ink-500">Récupérer</div>
              <div className="font-semibold">{order.restaurantName}</div>
            </div>
          </div>
          <div className="flex items-start gap-2">
            <span className="w-7 h-7 rounded-lg bg-emerald-500/10 text-emerald-600 grid place-items-center shrink-0"><I.MapPin size={14}/></span>
            <div>
              <div className="text-[10px] uppercase tracking-wider text-ink-500">Livrer à</div>
              <div className="font-semibold">{order.customer?.name} · {order.customer?.address}</div>
              <div className="text-xs text-ink-500">{order.customer?.phone}</div>
            </div>
          </div>
        </div>

        <div className="mt-4 pt-4 border-t border-dashed border-ink-200 dark:border-ink-800 flex items-center justify-between">
          <div>
            <div className="text-[10px] uppercase tracking-wider text-ink-500">Articles</div>
            <div className="font-bold">{order.items.reduce((s,i) => s + i.qty, 0)} × {order.totalDh.toFixed(0)} DH</div>
          </div>
          <div className="text-right">
            <div className="text-[10px] uppercase tracking-wider text-ink-500">Vous gagnez</div>
            <div className="font-bold text-emerald-600">+{(DELIVERY_FEE_DH * 1.5).toFixed(0)} DH</div>
          </div>
        </div>

        <div className="mt-4">{action}</div>
      </div>
    </div>
  );
}

/* ============================================================================
   RESTAURANT DASHBOARD
============================================================================ */
function RestaurantDashboard({ goto, dark, setDark }) {
  const [current, setCurrent] = useState('incoming');
  const RESTO_ID = 'pizza-palace';
  const titles = {
    incoming:'Commandes entrantes',
    menu:'Mon menu',
    stats:'Statistiques',
  };
  return (
    <DashLayout kind="restaurant" current={current} setCurrent={setCurrent} goto={goto} dark={dark} setDark={setDark}
      title={titles[current]} subtitle={`Connecté en tant que ${RESTAURANTS.find(r => r.id === RESTO_ID).name}`}>
      {current === 'incoming' && <RestoIncoming restoId={RESTO_ID}/>}
      {current === 'menu'     && <RestoMenu restoId={RESTO_ID}/>}
      {current === 'stats'    && <RestoStats restoId={RESTO_ID}/>}
    </DashLayout>
  );
}

function RestoIncoming({ restoId }) {
  const { orders, updateOrderStatus } = useOrders();
  const myOrders = orders.filter(o => o.restaurantId === restoId && o.status !== 'delivered' && o.status !== 'placed');

  /* Group by status */
  const buckets = {
    pickup_confirmed: myOrders.filter(o => o.status === 'pickup_confirmed'),
    preparing:        myOrders.filter(o => o.status === 'preparing'),
    delivering:       myOrders.filter(o => o.status === 'delivering'),
  };

  const Col = ({ status, title, color, action }) => (
    <div>
      <div className="flex items-center justify-between mb-3">
        <h3 className={`font-display font-bold flex items-center gap-2 ${color}`}>
          <span className={`w-2 h-2 rounded-full ${color.replace('text-','bg-')}`}></span>
          {title}
        </h3>
        <span className="text-xs font-bold px-2 py-0.5 rounded-md bg-ink-100 dark:bg-ink-800">{buckets[status].length}</span>
      </div>
      <div className="space-y-3 min-h-[200px]">
        {buckets[status].length === 0 ? (
          <div className="rounded-xl border-2 border-dashed border-ink-200 dark:border-ink-800 p-6 text-center text-xs text-ink-400">Vide</div>
        ) : buckets[status].map(o => (
          <RestoOrderCard key={o.id} order={o} action={action(o)}/>
        ))}
      </div>
    </div>
  );

  return (
    <div className="space-y-6">
      <div className="grid sm:grid-cols-3 gap-4">
        <StatCard label="Nouvelles" value={buckets.pickup_confirmed.length} icon={<I.Bell size={18}/>} color="from-sky-500 to-indigo-500"/>
        <StatCard label="En préparation" value={buckets.preparing.length}   icon={<I.Chef size={18}/>} color="from-violet-500 to-fuchsia-500"/>
        <StatCard label="En livraison" value={buckets.delivering.length}    icon={<I.Bike size={18}/>} color="from-pink-500 to-rose-500"/>
      </div>

      <div className="grid lg:grid-cols-3 gap-5">
        <Col status="pickup_confirmed" title="Nouvelles commandes" color="text-sky-600" action={(o) => (
          <Button onClick={() => updateOrderStatus(o.id, 'preparing')} variant="primary" size="md" className="w-full justify-center">
            ✅ Accepter & Préparer
          </Button>
        )}/>
        <Col status="preparing" title="En préparation" color="text-violet-600" action={(o) => (
          <Button onClick={() => updateOrderStatus(o.id, 'delivering')} variant="primary" size="md" className="w-full justify-center bg-gradient-to-r from-emerald-500 to-teal-500">
            🍽️ Terminer la préparation
          </Button>
        )}/>
        <Col status="delivering" title="En livraison" color="text-pink-600" action={(o) => (
          <div className="px-3 py-2 rounded-xl bg-pink-500/10 text-pink-600 text-xs font-bold text-center">
            🛵 En route vers client
          </div>
        )}/>
      </div>
    </div>
  );
}

function RestoOrderCard({ order, action }) {
  return (
    <div className="rounded-xl bg-white dark:bg-ink-900 border border-ink-200/60 dark:border-ink-800 p-3 shadow-card lift-on-hover">
      <div className="flex items-start justify-between gap-2">
        <div>
          <div className="font-bold text-sm">#{order.id}</div>
          <div className="text-[11px] text-ink-500">{order.customer?.name}</div>
        </div>
        <div className="text-right">
          <div className="font-bold text-sm">{order.totalDh.toFixed(0)} DH</div>
          <div className="text-[10px] text-ink-500">{order.items.reduce((s,i) => s+i.qty, 0)} art.</div>
        </div>
      </div>
      <div className="mt-2 space-y-1">
        {order.items.map(it => (
          <div key={it.id} className="flex items-center gap-2 text-xs">
            <span className="font-bold text-brand-600">{it.qty}×</span>
            <span className="truncate flex-1">{it.name}</span>
          </div>
        ))}
      </div>
      {order.courierName && (
        <div className="mt-2 text-[10px] text-ink-500 flex items-center gap-1"><I.Bike size={10}/> {order.courierName}</div>
      )}
      <div className="mt-3">{action}</div>
    </div>
  );
}

function RestoMenu({ restoId }) {
  const { restaurants, setRestaurants } = useOrders();
  const resto = restaurants.find(r => r.id === restoId);
  const [editing, setEditing] = useState(null);
  const [adding, setAdding] = useState(false);

  const updateItem = (catIdx, itemId, patch) => {
    setRestaurants(prev => prev.map(r => r.id !== restoId ? r : ({
      ...r,
      menu: r.menu.map((c, i) => i !== catIdx ? c : ({
        ...c,
        items: c.items.map(it => it.id !== itemId ? it : ({ ...it, ...patch })),
      })),
    })));
  };
  const removeItem = (catIdx, itemId) => {
    setRestaurants(prev => prev.map(r => r.id !== restoId ? r : ({
      ...r,
      menu: r.menu.map((c, i) => i !== catIdx ? c : ({
        ...c,
        items: c.items.filter(it => it.id !== itemId),
      })),
    })));
  };
  const addItem = (catIdx, item) => {
    const newItem = { ...item, id: 'new-' + Date.now() };
    setRestaurants(prev => prev.map(r => r.id !== restoId ? r : ({
      ...r,
      menu: r.menu.map((c, i) => i !== catIdx ? c : ({
        ...c,
        items: [...c.items, newItem],
      })),
    })));
  };

  return (
    <div className="space-y-6">
      {resto.menu.map((cat, catIdx) => (
        <div key={cat.category}>
          <div className="flex items-center justify-between mb-3">
            <h2 className="font-display font-extrabold text-xl">{cat.category}</h2>
            <button onClick={() => setAdding({ catIdx, name:'', desc:'', price:0, img:'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400' })}
              className="cursor-grow inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-brand-500 text-white text-xs font-bold hover:bg-brand-600 transition">
              <I.Plus size={14} stroke={3}/> Ajouter un plat
            </button>
          </div>
          <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
            {cat.items.map(it => (
              <div key={it.id} className="rounded-2xl bg-white dark:bg-ink-900 border border-ink-200/60 dark:border-ink-800 shadow-card overflow-hidden lift-on-hover">
                <div className="relative aspect-[4/3] overflow-hidden">
                  <img src={it.img} className="w-full h-full object-cover"/>
                  <div className="absolute top-2 right-2 flex gap-1">
                    <button onClick={() => setEditing({ catIdx, ...it })} className="cursor-grow w-8 h-8 rounded-lg bg-white/90 grid place-items-center shadow hover:scale-110 transition">
                      ✏️
                    </button>
                    <button onClick={() => removeItem(catIdx, it.id)} className="cursor-grow w-8 h-8 rounded-lg bg-red-500 text-white grid place-items-center shadow hover:scale-110 transition">
                      <I.Trash size={14}/>
                    </button>
                  </div>
                </div>
                <div className="p-3">
                  <div className="font-display font-bold">{it.name}</div>
                  <div className="text-xs text-ink-500 line-clamp-2">{it.desc}</div>
                  <div className="mt-2 flex items-center justify-between">
                    <span className="font-display font-extrabold text-brand-600">{it.price.toFixed(2).replace('.', ',')} €</span>
                    <span className="text-[10px] text-emerald-600 font-bold uppercase">Actif</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}

      {/* Edit modal */}
      {editing && (
        <ModalOverlay onClose={() => setEditing(null)}>
          <h3 className="font-display font-bold text-xl mb-4">Modifier le plat</h3>
          <div className="space-y-3">
            <Input label="Nom"   value={editing.name}  onChange={v => setEditing({ ...editing, name:v })}/>
            <Input label="Description" value={editing.desc} onChange={v => setEditing({ ...editing, desc:v })}/>
            <Input label="Prix (€)" value={editing.price} onChange={v => setEditing({ ...editing, price: parseFloat(v) || 0 })}/>
            <div className="rounded-xl border-2 border-dashed border-ink-200 dark:border-ink-800 p-6 text-center cursor-pointer hover:border-brand-500 transition">
              <div className="text-3xl mb-2">📷</div>
              <div className="text-xs text-ink-500">Glisser-déposer une image (mock)</div>
            </div>
          </div>
          <div className="mt-5 flex gap-2 justify-end">
            <Button variant="ghost" onClick={() => setEditing(null)}>Annuler</Button>
            <Button variant="primary" onClick={() => { updateItem(editing.catIdx, editing.id, { name:editing.name, desc:editing.desc, price:editing.price }); setEditing(null); }}>Enregistrer</Button>
          </div>
        </ModalOverlay>
      )}

      {/* Add modal */}
      {adding && (
        <ModalOverlay onClose={() => setAdding(null)}>
          <h3 className="font-display font-bold text-xl mb-4">Nouveau plat</h3>
          <div className="space-y-3">
            <Input label="Nom"   value={adding.name}  onChange={v => setAdding({ ...adding, name:v })}/>
            <Input label="Description" value={adding.desc} onChange={v => setAdding({ ...adding, desc:v })}/>
            <Input label="Prix (€)" value={adding.price} onChange={v => setAdding({ ...adding, price: parseFloat(v) || 0 })}/>
            <div className="rounded-xl border-2 border-dashed border-ink-200 dark:border-ink-800 p-6 text-center cursor-pointer hover:border-brand-500 transition">
              <div className="text-3xl mb-2">📷</div>
              <div className="text-xs text-ink-500">Glisser-déposer une image (mock)</div>
            </div>
          </div>
          <div className="mt-5 flex gap-2 justify-end">
            <Button variant="ghost" onClick={() => setAdding(null)}>Annuler</Button>
            <Button variant="primary" onClick={() => { addItem(adding.catIdx, { name:adding.name||'Nouveau plat', desc:adding.desc||'Description', price:adding.price||0, img:adding.img }); setAdding(null); }}>Ajouter</Button>
          </div>
        </ModalOverlay>
      )}
    </div>
  );
}

function ModalOverlay({ children, onClose }) {
  useEffect(() => {
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, []);
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-ink-950/60 backdrop-blur-sm animate-fade-in" onClick={onClose}>
      <div onClick={e => e.stopPropagation()} className="w-full max-w-md bg-white dark:bg-ink-900 rounded-3xl p-6 shadow-cardhover animate-scale-in border border-ink-200/60 dark:border-ink-800">
        {children}
      </div>
    </div>
  );
}

function RestoStats({ restoId }) {
  const { orders } = useOrders();
  const myOrders = orders.filter(o => o.restaurantId === restoId);
  const totalRev = myOrders.reduce((s,o) => s + o.totalDh, 0);
  const completed = myOrders.filter(o => o.status === 'delivered').length;

  return (
    <div className="space-y-6">
      <div className="grid sm:grid-cols-4 gap-4">
        <StatCard label="Commandes" value={myOrders.length} icon={<I.Bag size={18}/>} color="from-sky-500 to-indigo-500"/>
        <StatCard label="Livrées"   value={completed}        icon={<I.Check size={18}/>} color="from-emerald-500 to-teal-500"/>
        <StatCard label="CA"        value={`${totalRev.toFixed(0)} DH`} icon={<I.Star size={18}/>} color="from-brand-500 to-pink-500"/>
        <StatCard label="Note"      value="4,8 ⭐"           icon={<I.Sparkle size={18}/>} color="from-amber-500 to-orange-500"/>
      </div>
      <div className="grid lg:grid-cols-2 gap-4">
        <div className="p-5 rounded-2xl bg-white dark:bg-ink-900 border border-ink-200/60 dark:border-ink-800 shadow-card">
          <h3 className="font-display font-bold mb-3">Commandes par jour</h3>
          <BarChart data={[8,12,9,16,18,22,25]} labels={['Lun','Mar','Mer','Jeu','Ven','Sam','Dim']} color1="from-sky-500" color2="to-indigo-400"/>
        </div>
        <div className="p-5 rounded-2xl bg-white dark:bg-ink-900 border border-ink-200/60 dark:border-ink-800 shadow-card">
          <h3 className="font-display font-bold mb-3">CA sur 7 jours</h3>
          <LineChart data={[850, 1200, 980, 1640, 1820, 2100, 2350]} color="#3b82f6" color2="#06b6d4"/>
        </div>
      </div>
    </div>
  );
}

    setTimeout(() => splash && splash.remove(), 800);
