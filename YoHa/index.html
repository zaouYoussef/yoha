<style>
  *,*::before,*::after { -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  body {
    font-family:'Inter',ui-sans-serif,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    overflow-x:hidden;
  }
  ::selection { background:#fb923c; color:#fff; }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:999px; }
  ::-webkit-scrollbar-thumb:hover { background:#94a3b8; }
  .dark ::-webkit-scrollbar-thumb { background:#334155; }
  .dark ::-webkit-scrollbar-thumb:hover { background:#475569; }

  .glass {
    background:rgba(255,255,255,.65);
    backdrop-filter:saturate(180%) blur(18px);
    -webkit-backdrop-filter:saturate(180%) blur(18px);
    border:1px solid rgba(255,255,255,.5);
  }
  .dark .glass { background:rgba(15,23,42,.55); border:1px solid rgba(255,255,255,.08); }

  .glass-strong {
    background:rgba(255,255,255,.85);
    backdrop-filter:saturate(180%) blur(24px);
    -webkit-backdrop-filter:saturate(180%) blur(24px);
    border:1px solid rgba(255,255,255,.6);
  }
  .dark .glass-strong { background:rgba(2,6,23,.78); border:1px solid rgba(255,255,255,.08); }

  .glass-dark {
    background:rgba(2,6,23,.6);
    backdrop-filter:saturate(180%) blur(20px);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    border:1px solid rgba(255,255,255,.08);
  }

  .text-gradient {
    background:linear-gradient(120deg,#f97316 0%,#ec4899 35%,#8b5cf6 70%,#3b82f6 100%);
    background-size:200% 200%;
    -webkit-background-clip:text; background-clip:text; color:transparent;
    animation:gradient-x 8s ease infinite;
  }
  .text-gradient-warm {
    background:linear-gradient(120deg,#f97316,#fb923c,#ec4899,#f97316);
    background-size:200% 200%;
    -webkit-background-clip:text; background-clip:text; color:transparent;
    animation:gradient-x 6s ease infinite;
  }

  /* Border gradient */
  .gradient-border { position:relative; isolation:isolate; }
  .gradient-border::before {
    content:''; position:absolute; inset:0; padding:1px; border-radius:inherit;
    background:linear-gradient(135deg,#f97316,#ec4899,#8b5cf6,#3b82f6);
    background-size:200% 200%; animation:gradient-x 4s ease infinite;
    -webkit-mask:linear-gradient(#000,#000) content-box,linear-gradient(#000,#000);
    -webkit-mask-composite:xor; mask-composite:exclude;
    pointer-events:none;
  }

  .btn-shine { position:relative; overflow:hidden; }
  .btn-shine::after {
    content:''; position:absolute; top:0; left:0; width:40%; height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,.55),transparent);
    transform:translateX(-120%); pointer-events:none;
  }
  .btn-shine:hover::after { animation:shine 1.2s linear; }
  @keyframes shine { 0%{transform:translateX(-120%)} 100%{transform:translateX(220%)} }

  .ripple { position:relative; overflow:hidden; }
  .ripple-effect {
    position:absolute; border-radius:9999px; transform:scale(0);
    animation:ripple-anim .7s cubic-bezier(.16,1,.3,1);
    background-color:rgba(255,255,255,.6); pointer-events:none;
  }
  @keyframes ripple-anim { to { transform:scale(4); opacity:0; } }

  .skeleton {
    background:linear-gradient(90deg,#e2e8f0 0%,#f1f5f9 40%,#e2e8f0 80%);
    background-size:1000px 100%;
    animation:shimmer 1.6s linear infinite;
  }
  .dark .skeleton {
    background:linear-gradient(90deg,#1e293b 0%,#334155 40%,#1e293b 80%);
    background-size:1000px 100%;
  }
  @keyframes shimmer { 0%{background-position:-1000px 0} 100%{background-position:1000px 0} }

  .no-scrollbar::-webkit-scrollbar { display:none; }
  .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }

  .card-lift { transition:transform .35s cubic-bezier(.16,1,.3,1), box-shadow .35s; }
  .card-lift:hover { transform:translateY(-6px); }

  .mesh-bg {
    background-image:
      radial-gradient(at 20% 25%,rgba(249,115,22,.35) 0,transparent 50%),
      radial-gradient(at 80% 15%,rgba(168,85,247,.30) 0,transparent 50%),
      radial-gradient(at 65% 85%,rgba(59,130,246,.30) 0,transparent 50%),
      radial-gradient(at 10% 80%,rgba(236,72,153,.30) 0,transparent 50%);
  }
  .dark .mesh-bg {
    background-image:
      radial-gradient(at 20% 25%,rgba(249,115,22,.25) 0,transparent 50%),
      radial-gradient(at 80% 15%,rgba(168,85,247,.22) 0,transparent 50%),
      radial-gradient(at 65% 85%,rgba(59,130,246,.22) 0,transparent 50%),
      radial-gradient(at 10% 80%,rgba(236,72,153,.22) 0,transparent 50%);
  }

  .mesh-conic {
    background:conic-gradient(from 180deg at 50% 50%,
      rgba(249,115,22,.3) 0deg,
      rgba(236,72,153,.3) 90deg,
      rgba(139,92,246,.3) 180deg,
      rgba(59,130,246,.3) 270deg,
      rgba(249,115,22,.3) 360deg);
    filter:blur(40px);
  }

  /* Animated grid background */
  .grid-bg {
    background-image:
      linear-gradient(rgba(15,23,42,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(15,23,42,.05) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image:radial-gradient(ellipse at center, #000 30%, transparent 70%);
    -webkit-mask-image:radial-gradient(ellipse at center, #000 30%, transparent 70%);
  }
  .dark .grid-bg {
    background-image:
      linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
  }

  .caret { display:inline-block; width:3px; background:currentColor; animation:caret 1s steps(1) infinite; margin-left:2px; }
  @keyframes caret { 50% { opacity:0; } }

  img { -webkit-user-drag:none; }

  button:focus-visible, a:focus-visible, input:focus-visible {
    outline:2px solid #fb923c; outline-offset:2px; border-radius:12px;
  }

  .page-enter { animation:fade-up .55s cubic-bezier(.16,1,.3,1) both; }
  @keyframes fade-up { 0%{opacity:0;transform:translateY(20px)} 100%{opacity:1;transform:translateY(0)} }

  .reveal { opacity:0; transform:translateY(30px); transition:opacity .8s cubic-bezier(.16,1,.3,1), transform .8s cubic-bezier(.16,1,.3,1); }
  .reveal.in { opacity:1; transform:translateY(0); }

  .marquee { display:flex; width:max-content; animation:marquee 28s linear infinite; }
  @keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }

  button { user-select:none; }

  /* Cursor follower */
  .cursor-glow {
    position:fixed; top:0; left:0; width:520px; height:520px; border-radius:50%;
    background:radial-gradient(circle, rgba(249,115,22,.18) 0%, transparent 65%);
    pointer-events:none; z-index:1; transform:translate(-9999px,-9999px);
    transition:opacity .3s, width .3s, height .3s;
    will-change:transform;
  }
  .dark .cursor-glow { background:radial-gradient(circle, rgba(249,115,22,.13) 0%, transparent 65%); }
  @media (pointer:coarse) { .cursor-glow { display:none; } }

  /* Spotlight on hero */
  .hero-spot::before {
    content:''; position:absolute; inset:-20%;
    background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(249,115,22,.16) 0%, transparent 35%);
    pointer-events:none; z-index:0; transition:background .15s;
  }
  .dark .hero-spot::before { background:radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(249,115,22,.12) 0%, transparent 35%); }

  /* Tilt 3D wrapper */
  .tilt-3d { transform-style:preserve-3d; transition:transform .25s cubic-bezier(.16,1,.3,1); will-change:transform; }
  .tilt-3d > * { transform:translateZ(0); }

  /* Magnetic */
  .magnetic { transition:transform .25s cubic-bezier(.16,1,.3,1); will-change:transform; }

  /* Particles */
  .particle {
    position:absolute; border-radius:50%;
    background:radial-gradient(circle, rgba(249,115,22,.7), transparent 70%);
    pointer-events:none;
  }

  /* Order tracking path */
  .bike-on-path {
    offset-path: path('M 0 50 Q 100 20, 200 60 T 400 50');
    animation:bike-go 4s ease-in-out infinite alternate;
  }

  /* Loading screen */
  #yoha-splash {
    position:fixed; inset:0; z-index:200;
    background:radial-gradient(ellipse at center, #1e293b 0%, #020617 100%);
    display:grid; place-items:center;
    transition:opacity .7s ease, visibility .7s;
  }
  #yoha-splash.hide { opacity:0; visibility:hidden; pointer-events:none; }

  /* Floating emoji decorations */
  .emoji-deco {
    position:absolute; font-size:2rem; pointer-events:none; user-select:none;
    filter:drop-shadow(0 8px 16px rgba(0,0,0,.15));
    animation:float 7s ease-in-out infinite;
  }

  /* Scroll snap testimonials */
  .testi-track { scroll-snap-type:x mandatory; }
  .testi-track > * { scroll-snap-align:start; }

  /* Shiny gradient bg for cards */
  .holo {
    background: linear-gradient(135deg, rgba(249,115,22,.1), rgba(236,72,153,.1), rgba(139,92,246,.1), rgba(59,130,246,.1));
    background-size:300% 300%;
    animation:gradient-x 8s ease infinite;
  }

  /* Bike wheel rotation */
  .wheel { animation:spin 1.2s linear infinite; transform-origin:center; transform-box:fill-box; }

  .pulse-ring {
    position:absolute; inset:0; border-radius:inherit;
    box-shadow:0 0 0 0 rgba(249,115,22,.6);
    animation:ring 2s ease-out infinite;
  }
  @keyframes ring {
    0% { box-shadow:0 0 0 0 rgba(249,115,22,.6); }
    100% { box-shadow:0 0 0 24px rgba(249,115,22,0); }
  }
</style>
</head>

function makeItems(type, restId) {
  const names = MENU_LIBRARY[type] || MENU_LIBRARY.pizza;
  const img = GOOGLE_IMG[type] || GOOGLE_IMG.pizza;
  const seed = restId.split('').reduce((acc, ch) => acc + ch.charCodeAt(0), 0);
  const base = {
    pizza:35, burger:45, tacos:40, kebab:45, sushi:50,
    healthy:32, asian:38, medical:30, dessert:22, drinks:12,
  }[type] || 30;
  return names.map((name, i) => ({
    id:`${restId}-${i + 1}`,
    name,
    price:base + (i % 5) * 5,
    desc:`${name} préparé frais.`,
    img:img[(i + seed) % img.length],
  }));
}

function makeRestaurant(restId, name, cuisine, tags, distance, promo) {
  const imageSet = GOOGLE_IMG[cuisine] || GOOGLE_IMG.pizza;
  const seed = restId.split('').reduce((acc, ch) => acc + ch.charCodeAt(0), 0);
  const etaMap = { pizza:'20-35 min', burger:'20-30 min', tacos:'20-35 min', kebab:'20-35 min', sushi:'25-40 min', healthy:'15-25 min', asian:'20-30 min', medical:'15-22 min', dessert:'10-20 min', drinks:'10-18 min', pharmacy:'10-20 min', pastry:'15-25 min' };
  const categoryLabelMap = { pharmacy:'Services santé', pastry:'Menu pâtisserie' };
  return {
    id:restId,
    name,
    cuisine,
    tags,
    rating:Number((4.3 + (restId.length % 7) / 10).toFixed(1)),
    reviews:500 + restId.length * 37,
    eta:etaMap[cuisine] || '20-30 min',
    fee:'Livraison offerte',
    distance,
    promo,
    cover:imageSet[seed % imageSet.length],
    logo:imageSet[(seed + 1) % imageSet.length],
    description:`${name} propose une carte variée et populaire à Tanger.`,
    menu:[{ category:categoryLabelMap[cuisine] || 'Menu complet', items:makeItems(cuisine, restId) }],
  };
}

/* ============================================================================
   APP — root, view router, contexts
============================================================================ */
const ToastCtx = createContext(null);
const useToast = () => useContext(ToastCtx);

function App() {
  const [view, setView] = useState({ name:'landing' });
  const [dark, setDark] = useState(false);
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [toasts, setToasts] = useState([]);

  const routeToHash = useCallback((nextView) => {
    if (nextView.name === 'home' && nextView.filter && nextView.filter !== 'all') {
      return `home/${encodeURIComponent(nextView.filter)}`;
    }
    if (nextView.name === 'restaurant' && nextView.restaurant?.id) {
      return `restaurant/${encodeURIComponent(nextView.restaurant.id)}`;
    }
    return nextView.name;
  }, []);

  const hashToRoute = useCallback((hashValue) => {
    const raw = (hashValue || '').replace(/^#/, '');
    if (!raw || raw === 'landing') return { name:'landing' };
    if (raw === 'home') return { name:'home' };
    if (raw.startsWith('home/')) {
      const filter = decodeURIComponent(raw.split('/')[1] || 'all');
      return { name:'home', filter };
    }
    if (raw === 'checkout') return { name:'checkout' };
    if (raw === 'success') return { name:'success' };
    if (raw.startsWith('restaurant/')) {
      const id = decodeURIComponent(raw.split('/')[1] || '');
      const restaurant = RESTAURANTS.find(r => r.id === id);
      return restaurant ? { name:'restaurant', restaurant } : { name:'home' };
    }
    return { name:'landing' };
  }, []);

  /* dark mode bootstrap */
  useEffect(() => {
    const stored = localStorage.getItem('yoha-theme');
    const prefers = window.matchMedia?.('(prefers-color-scheme: dark)').matches;
    setDark(stored ? stored === 'dark' : prefers);
  }, []);
  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
    document.querySelector('meta[name="theme-color"]')?.setAttribute('content', dark ? '#020617' : '#fff7ed');
    localStorage.setItem('yoha-theme', dark ? 'dark' : 'light');
  }, [dark]);

  useEffect(() => {
    const applyHashRoute = () => setView(hashToRoute(window.location.hash));
    applyHashRoute();
    window.addEventListener('hashchange', applyHashRoute);
    return () => window.removeEventListener('hashchange', applyHashRoute);
  }, [hashToRoute]);

  useEffect(() => { window.scrollTo({ top:0, behavior:'instant' }); }, [view]);

  const pushToast = useCallback((t) => {
    const id = Math.random().toString(36).slice(2);
    setToasts(prev => [...prev, { id, ...t }]);
    setTimeout(() => setToasts(prev => prev.filter(x => x.id !== id)), t.duration || 2400);
  }, []);
  const toastApi = { push: pushToast };

  const addToCart = (item, restaurant) => {
    setCart(prev => {
      const e = prev.find(p => p.id === item.id);
      if (e) return prev.map(p => p.id === item.id ? { ...p, qty: p.qty + 1 } : p);
      return [...prev, { ...item, qty:1, restaurantId:restaurant.id, restaurantName:restaurant.name }];
    });
    pushToast({ title:'Ajouté au panier', desc:item.name, type:'success' });
  };
  const removeFromCart = id => setCart(prev => prev.filter(p => p.id !== id));
  const setQty = (id, qty) => setCart(prev => qty <= 0 ? prev.filter(p => p.id !== id) : prev.map(p => p.id === id ? { ...p, qty } : p));
  const clearCart = () => setCart([]);

  const cartCount = cart.reduce((s,p) => s + p.qty, 0);
  const cartTotal = cart.reduce((s,p) => s + p.qty * p.price, 0);

  const goto = useCallback((name, params={}) => {
    const nextView = { name, ...params };
    setView(nextView);
    const nextHash = routeToHash(nextView);
    if (window.location.hash !== `#${nextHash}`) {
      window.location.hash = nextHash;
    }
  }, [routeToHash]);

  return (
    <ToastCtx.Provider value={toastApi}>
      <CursorGlow />
      <div className="min-h-screen flex flex-col relative">
        <Navbar
          dark={dark} setDark={setDark}
          cartCount={cartCount}
          onCart={() => setCartOpen(true)}
          onLogo={() => goto('landing')}
          onHome={() => goto('home', { filter:'all' })}
          onPharmacy={() => goto('home', { filter:'pharmacy' })}
          onPastry={() => goto('home', { filter:'pastry' })}
        />

        <main className="flex-1 pt-16 pb-24 md:pb-0">
          {view.name === 'landing'    && <Landing onStart={() => goto('home')} />}
          {view.name === 'home'       && <Home initialFilter={view.filter || 'all'} onPickRestaurant={(r) => goto('restaurant', { restaurant: r })} />}
          {view.name === 'restaurant' && <RestaurantPage restaurant={view.restaurant} onBack={() => goto('home')} onAdd={addToCart} />}
          {view.name === 'checkout'   && <Checkout cart={cart} total={cartTotal} onBack={() => setCartOpen(true)} onSuccess={() => { clearCart(); goto('success'); }} />}
          {view.name === 'success'    && <SuccessPage onHome={() => goto('home')} />}
        </main>

        {(view.name === 'landing' || view.name === 'home') && (
          <div className="max-w-7xl mx-auto w-full px-4 sm:px-6 pb-10 sm:pb-14">
            <CampusHospitalsSection />
          </div>
        )}

        <Footer />

        <BottomNav active={view.name} onHome={() => goto('home')} onSearch={() => goto('home')} onCart={() => setCartOpen(true)} cartCount={cartCount} />

        <CartSidebar
          open={cartOpen} onClose={() => setCartOpen(false)}
          items={cart} setQty={setQty} remove={removeFromCart}
          total={cartTotal}
          onCheckout={() => { setCartOpen(false); goto('checkout'); }}
        />

        <FloatingCart count={cartCount} total={cartTotal} onClick={() => setCartOpen(true)} hidden={view.name === 'landing' || view.name === 'success' || cartOpen} />

        <ToastViewport toasts={toasts} />
      </div>
    </ToastCtx.Provider>
  );
}

/* ============================================================================
   CURSOR GLOW — fluid orange light following the cursor (desktop only)
============================================================================ */
function CursorGlow() {
  const ref = useRef();
  useEffect(() => {
    if (window.matchMedia('(pointer: coarse)').matches) return;
    const el = ref.current; if (!el) return;
    let raf, tx = 0, ty = 0, cx = 0, cy = 0;
    const move = e => { tx = e.clientX; ty = e.clientY; };
    const tick = () => {
      cx += (tx - cx) * 0.18;
      cy += (ty - cy) * 0.18;
      el.style.transform = `translate(${cx - 260}px, ${cy - 260}px)`;
      raf = requestAnimationFrame(tick);
    };
    document.addEventListener('mousemove', move);
    raf = requestAnimationFrame(tick);
    return () => { document.removeEventListener('mousemove', move); cancelAnimationFrame(raf); };
  }, []);
  return <div ref={ref} className="cursor-glow"></div>;
}

function Home({ initialFilter = 'all', onPickRestaurant }) {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState(initialFilter);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    setFilter(initialFilter || 'all');
  }, [initialFilter]);

  useEffect(() => {
    setLoading(true);
    const t = setTimeout(() => setLoading(false), 600);
    return () => clearTimeout(t);
  }, [filter]);

  const restaurants = useMemo(() => {
    return RESTAURANTS.filter(r => {
      const matchCuisine = filter === 'all' || r.cuisine === filter;
      const matchSearch = !search ||
        r.name.toLowerCase().includes(search.toLowerCase()) ||
        r.tags.join(' ').toLowerCase().includes(search.toLowerCase());
      return matchCuisine && matchSearch;
    });
  }, [search, filter]);

  return (
    <div className="page-enter max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-10">
      <div className="flex flex-col gap-4">
        <div className="flex items-start sm:items-center gap-3 flex-wrap">
          <div>
            <h1 className="font-display font-extrabold text-3xl sm:text-4xl tracking-tight">
              Salut <span className="text-gradient">toi</span> 👋
            </h1>
            <div className="mt-1 flex items-center gap-1.5 text-sm text-ink-500 dark:text-ink-400">
              <I.MapPin size={14}/> Livraison à <span className="font-semibold text-ink-700 dark:text-ink-200">CHU Tanger</span>
            </div>

          </div>
          <div className="ml-auto flex items-center gap-2">
            <span className="hidden sm:inline-flex items-center gap-2 px-3 py-2 rounded-xl bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 text-xs font-semibold">
              <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Maintenant — 25-35 min
            </span>
          </div>
        </div>

        <SearchBar value={search} onChange={setSearch} />

        <div className="-mx-4 sm:mx-0 px-4 sm:px-0 overflow-x-auto no-scrollbar pt-1">
          <div className="flex gap-3 min-w-max sm:min-w-0 sm:grid sm:grid-cols-4 lg:grid-cols-8">
            {CATEGORIES_BANNERS.map((c) => {
              const map = { 'Pizza':'pizza','Burger':'burger','Tacos':'tacos','Kebab':'kebab','Pharmacie':'pharmacy','Pâtisserie':'pastry','Healthy':'healthy','Sushi':'sushi','Asiatique':'asian','MedEat':'medical','Dessert':'dessert','Boissons':'drinks' };
              const id = map[c.label];
              const active = filter === id;
              return (
                <button key={c.label} onClick={() => setFilter(active ? 'all' : id)}
                  className={`group relative shrink-0 w-32 sm:w-auto h-24 rounded-2xl overflow-hidden text-left p-3 transition-all ${active ? 'ring-2 ring-brand-500 scale-[0.98]' : ''}`}>
                  <div className={`absolute inset-0 bg-gradient-to-br ${c.gradient} opacity-90 group-hover:opacity-100 transition`}></div>
                  <div className="relative text-white">
                    <div className="text-2xl group-hover:scale-110 transition-transform">{c.emoji}</div>
                    <div className="font-display font-bold text-sm mt-1">{c.label}</div>
                  </div>
                </button>
              );
            })}
          </div>
        </div>

        <div className="flex gap-2 overflow-x-auto no-scrollbar -mx-4 sm:mx-0 px-4 sm:px-0 pt-1">
          {CUISINES.map(c => {
            const active = filter === c.id;
            return (
              <button key={c.id} onClick={() => setFilter(c.id)}
                className={`shrink-0 inline-flex items-center gap-1.5 px-4 py-2 rounded-full text-sm font-semibold transition-all ${active
                  ? 'bg-ink-900 text-white dark:bg-white dark:text-ink-900 shadow-md scale-105'
                  : 'bg-white dark:bg-ink-900 text-ink-700 dark:text-ink-200 border border-ink-200 dark:border-ink-800 hover:border-brand-500'}`}>
                <span>{c.emoji}</span> {c.label}
              </button>
            );
          })}
        </div>
      </div>

      <div className="mt-8 flex items-baseline justify-between">
        <h2 className="font-display font-extrabold text-2xl sm:text-3xl">
          {filter === 'all' ? 'Tous les restaurants' : CUISINES.find(c => c.id === filter)?.label}
        </h2>
        <span className="text-sm text-ink-500 dark:text-ink-400">{loading ? '…' : `${restaurants.length} adresses`}</span>
      </div>

      <div className="mt-5 grid sm:grid-cols-2 lg:grid-cols-3 gap-5">
        {loading
          ? Array.from({ length: 6 }).map((_, i) => <RestaurantSkeleton key={i} />)
          : restaurants.length === 0
            ? <EmptyState />
            : restaurants.map((r, i) => (
                <Reveal key={r.id} delay={i*60}>
                  <Tilt max={6}>
                    <RestaurantCard restaurant={r} onClick={() => onPickRestaurant(r)} />
                  </Tilt>
                </Reveal>
              ))
        }
      </div>
    </div>
  );
}

/* ============================================================================

============================================================================ */
function RestaurantPage({ restaurant, onBack, onAdd }) {
  const r = restaurant;
  const [activeCat, setActiveCat] = useState(r.menu[0].category);
  const sectionRefs = useRef({});

  const scrollToCat = (cat) => {
    setActiveCat(cat);
    const el = sectionRefs.current[cat];
    if (el) {
      const top = el.getBoundingClientRect().top + window.scrollY - 180;
      window.scrollTo({ top, behavior:'smooth' });
    }
  };

  useEffect(() => {
    const onScroll = () => {
      const offsets = r.menu.map(c => ({
        cat: c.category,
        top: sectionRefs.current[c.category]?.getBoundingClientRect().top || 0
      }));
      const visible = offsets.filter(o => o.top < 220).pop();
      if (visible) setActiveCat(visible.cat);
    };
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, [r]);

  return (
    <div className="page-enter">
      <section className="relative h-[42vh] sm:h-[55vh] min-h-[280px] overflow-hidden">
        <img src={r.cover} alt={r.name} className="absolute inset-0 w-full h-full object-cover scale-105"
          onError={(e) => { e.currentTarget.src = 'https://picsum.photos/seed/yoha-restaurant-hero/1400/900'; }}/>
        <div className="absolute inset-0 bg-gradient-to-t from-ink-950 via-ink-950/40 to-transparent"></div>
        <div className="absolute inset-0 flex items-end">
          <div className="max-w-7xl mx-auto w-full px-4 sm:px-6 pb-8 sm:pb-12">
            <button onClick={onBack} className="mb-4 inline-flex items-center gap-2 px-3 py-2 rounded-xl glass text-white hover:bg-white/20 transition">
              <I.Left size={18}/> Retour
            </button>
            <div className="flex items-end gap-4">
              <div className="w-16 h-16 sm:w-20 sm:h-20 rounded-2xl overflow-hidden border-4 border-white shadow-cardhover bg-white">
                <img src={r.logo} alt="" className="w-full h-full object-cover"
                  onError={(e) => { e.currentTarget.src = 'https://picsum.photos/seed/yoha-logo/240/240'; }}/>
              </div>
              <div className="text-white">
                <h1 className="font-display font-black text-3xl sm:text-5xl tracking-tight">{r.name}</h1>
                <div className="mt-1 flex flex-wrap items-center gap-x-3 gap-y-1 text-sm">
                  <span className="inline-flex items-center gap-1"><I.Star size={14} className="fill-amber-400 text-amber-400"/> <b>{r.rating.toString().replace('.',',')}</b> <span className="opacity-70">({r.reviews}+ avis)</span></span>
                  <span className="opacity-70">•</span>
                  <span className="inline-flex items-center gap-1"><I.Clock size={14}/> {r.eta}</span>
                  <span className="opacity-70">•</span>
                  <span className="inline-flex items-center gap-1"><I.MapPin size={14}/> {r.distance}</span>
                  <span className="opacity-70">•</span>
                  <span className="inline-flex items-center gap-1"><I.Bike size={14}/> {r.fee}</span>
                </div>
              </div>
            </div>
            <p className="mt-3 max-w-2xl text-white/85 text-sm sm:text-base">{r.description}</p>
          </div>
        </div>
      </section>

      <div className="sticky top-16 z-30 glass-strong border-b border-ink-200/60 dark:border-ink-800/60">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 flex gap-1 overflow-x-auto no-scrollbar h-14 items-center">
          {r.menu.map(c => {
            const active = activeCat === c.category;
            return (
              <button key={c.category} onClick={() => scrollToCat(c.category)}
                className={`shrink-0 px-4 h-10 rounded-full text-sm font-semibold transition-all ${active
                  ? 'bg-ink-900 text-white dark:bg-white dark:text-ink-900'
                  : 'text-ink-600 dark:text-ink-300 hover:bg-ink-100 dark:hover:bg-ink-800'}`}>
                {c.category}
              </button>
            );
          })}
        </div>
      </div>

      <section className="max-w-7xl mx-auto px-4 sm:px-6 py-10">
        {r.menu.map(cat => (
          <div key={cat.category} ref={el => sectionRefs.current[cat.category] = el} className="mb-12 scroll-mt-44">
            <h2 className="font-display font-extrabold text-2xl sm:text-3xl mb-5">{cat.category}</h2>
            <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
              {cat.items.map((it, i) => (
                <Reveal key={it.id} delay={i*40}>
                  <MenuItem item={it} onAdd={() => onAdd(it, r)} />
                </Reveal>
              ))}
            </div>
          </div>
        ))}
      </section>
    </div>
  );
}

    color:['#f97316','#ec4899','#8b5cf6','#3b82f6','#10b981','#f59e0b'][i % 6],
    rotate:Math.random()*360, shape:i % 3,
  })), []);
  return (
    <div className="pointer-events-none absolute inset-0 overflow-hidden">
      {pieces.map(p => (
        <span key={p.id}
          style={{
            position:'absolute', top:'-10px', left:`${p.left}%`,
            width:p.shape === 1 ? 10 : 8, height:p.shape === 0 ? 14 : 8,
            background:p.color, borderRadius:p.shape === 2 ? '50%' : 2,
            transform:`rotate(${p.rotate}deg)`,
            animation:`fall ${p.duration}s ${p.delay}s ease-in forwards`,
          }}/>
      ))}
      <style>{`@keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0.4; } }`}</style>
    </div>
  );
}

/* ============================================================================
   PRIMITIVES
============================================================================ */
function Button({ children, variant='primary', size='md', className='', onClick, disabled, ...rest }) {
  const sizes = { md:'h-11 px-5 text-sm', lg:'h-14 px-7 text-base', sm:'h-9 px-3 text-sm' };
  const variants = {
    primary:'bg-gradient-to-r from-brand-500 via-pink-500 to-violet-500 text-white shadow-glow hover:shadow-glow-lg hover:-translate-y-0.5',
    ghost:  'bg-white/60 dark:bg-ink-900/60 backdrop-blur border border-ink-200/60 dark:border-ink-800 hover:border-brand-500',
    glass:  'glass-strong text-white border border-white/20 hover:bg-white/20',
    dark:   'bg-ink-900 text-white dark:bg-white dark:text-ink-900 hover:opacity-90',
  };
  return (
    <button
      onClick={(e) => { rippleEffect(e); onClick && onClick(e); }}
      disabled={disabled}
      className={`ripple btn-shine relative inline-flex items-center justify-center gap-2 font-semibold rounded-2xl transition-all active:scale-95 disabled:opacity-60 disabled:cursor-not-allowed ${sizes[size]} ${variants[variant]} ${className}`}
      {...rest}
    >
      {children}
    </button>
  );
}

function rippleEffect(e) {
  const target = e.currentTarget;
  if (!target) return;
  const rect = target.getBoundingClientRect();
  const ripple = document.createElement('span');
  const size = Math.max(rect.width, rect.height);
  ripple.className = 'ripple-effect';
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
  ripple.style.top  = (e.clientY - rect.top  - size/2) + 'px';
  target.appendChild(ripple);
  setTimeout(() => ripple.remove(), 700);
}

function Reveal({ children, delay = 0 }) {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { setTimeout(() => setShown(true), delay); io.disconnect(); }
    }, { rootMargin:'-30px' });
    io.observe(el);
    return () => io.disconnect();
  }, [delay]);
  return <div ref={ref} className={`reveal ${shown ? 'in' : ''}`}>{children}</div>;
}

/* 3D tilt — subtle perspective rotation following cursor */
function Tilt({ children, max = 8, className = "" }) {
  const ref = useRef();
  useEffect(() => {
    const el = ref.current; if (!el) return;
    if (window.matchMedia('(pointer: coarse)').matches) return;
    const onMove = (e) => {
      const r = el.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width - 0.5;
      const y = (e.clientY - r.top ) / r.height - 0.5;
      el.style.transform = `perspective(1100px) rotateX(${-y*max}deg) rotateY(${x*max}deg) translateY(-3px)`;
    };
    const onLeave = () => { el.style.transform = ''; };
    el.addEventListener('mousemove', onMove);
    el.addEventListener('mouseleave', onLeave);
    return () => { el.removeEventListener('mousemove', onMove); el.removeEventListener('mouseleave', onLeave); };
  }, [max]);
  return <div ref={ref} className={`tilt-3d ${className}`}>{children}</div>;
}

/* Magnetic — translate slightly toward cursor */
function Magnetic({ children, strength = 25 }) {
  const ref = useRef();
  useEffect(() => {
    const el = ref.current; if (!el) return;
    if (window.matchMedia('(pointer: coarse)').matches) return;
    const onMove = (e) => {
      const r = el.getBoundingClientRect();
      const x = e.clientX - r.left - r.width/2;
      const y = e.clientY - r.top  - r.height/2;
      el.style.transform = `translate(${x/strength}px, ${y/strength}px)`;
    };
    const onLeave = () => { el.style.transform = ''; };
    el.addEventListener('mousemove', onMove);
    el.addEventListener('mouseleave', onLeave);
    return () => { el.removeEventListener('mousemove', onMove); el.removeEventListener('mouseleave', onLeave); };
  }, [strength]);
  return <div ref={ref} className="magnetic inline-block">{children}</div>;
}

/* Counter — animated number on view */
function Counter({ to, duration = 1800, decimals = 0, suffix = '' }) {
  const [val, setVal] = useState(0);
  const ref = useRef();
  const started = useRef(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting && !started.current) {
        started.current = true;
        const start = performance.now();
        const tick = (now) => {
          const elapsed = now - start;
          const p = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - p, 3);
          setVal(to * eased);
          if (p < 1) requestAnimationFrame(tick);
          else setVal(to);
        };
        requestAnimationFrame(tick);
        io.disconnect();
      }
    });
    io.observe(el);
    return () => io.disconnect();
  }, [to, duration]);
  const display = decimals > 0
    ? val.toFixed(decimals).replace('.', ',')
    : Math.floor(val).toLocaleString('fr-FR');
  return <span ref={ref}>{display}{suffix}</span>;
}

function ToastViewport({ toasts }) {

          <span className={`w-9 h-9 rounded-xl grid place-items-center shrink-0 ${
            t.type === 'success' ? 'bg-emerald-500/15 text-emerald-600' :
            t.type === 'error'   ? 'bg-red-500/15 text-red-600' :
                                    'bg-brand-500/15 text-brand-600'
          }`}>

          </span>
          <div className="min-w-0">
            <div className="font-semibold text-sm">{t.title}</div>
            {t.desc && <div className="text-xs text-ink-500 truncate">{t.desc}</div>}
          </div>
        </div>
      ))}
    </div>
  );
}
